<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Soft background -->
  <circle cx="64" cy="64" r="62" fill="#3584e4" opacity="0.12"/>
  <circle cx="64" cy="64" r="62" fill="none" stroke="#3584e4" stroke-width="2"/>

  <!-- Cat body -->
  <ellipse cx="64" cy="88" rx="30" ry="22" fill="#f5c211"/>
  <!-- Belly highlight -->
  <ellipse cx="64" cy="93" rx="20" ry="15" fill="#f9e547" opacity="0.5"/>

  <!-- Cat head -->
  <circle cx="64" cy="50" r="26" fill="#f5c211"/>

  <!-- Ears — outer -->
  <path d="M40 38 L44 8 L58 32 Z" fill="#f5c211"/>
  <path d="M88 38 L84 8 L70 32 Z" fill="#f5c211"/>
  <!-- Ears — inner pink -->
  <path d="M44 34 L46 16 L56 32 Z" fill="#ff9e3d" opacity="0.55"/>
  <path d="M84 34 L82 16 L72 32 Z" fill="#ff9e3d" opacity="0.55"/>

  <!-- Eyes — white -->
  <ellipse cx="53" cy="47" rx="6" ry="7" fill="white"/>
  <ellipse cx="75" cy="47" rx="6" ry="7" fill="white"/>
  <!-- Eyes — pupils -->
  <ellipse cx="54" cy="47" rx="3.5" ry="4.5" fill="#1a1a1a"/>
  <ellipse cx="76" cy="47" rx="3.5" ry="4.5" fill="#1a1a1a"/>
  <!-- Eye shine -->
  <circle cx="56" cy="44.5" r="1.8" fill="white"/>
  <circle cx="78" cy="44.5" r="1.8" fill="white"/>

  <!-- Nose -->
  <path d="M61 56 L64 60 L67 56 Z" fill="#ed333b" opacity="0.8"/>

  <!-- Mouth -->
  <path d="M64 60 Q59 65 54 61" fill="none" stroke="#1a1a1a" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M64 60 Q69 65 74 61" fill="none" stroke="#1a1a1a" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Whiskers -->
  <line x1="28" y1="52" x2="48" y2="54" stroke="#1a1a1a" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="29" y1="58" x2="48" y2="57" stroke="#1a1a1a" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="80" y1="54" x2="100" y2="52" stroke="#1a1a1a" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="80" y1="57" x2="99" y2="58" stroke="#1a1a1a" stroke-width="0.8" stroke-linecap="round"/>

  <!-- ═══ HEADSET ═══ -->

  <!-- Headband -->
  <path d="M38 38 Q64 14 90 38" fill="none" stroke="#5e5c64" stroke-width="5" stroke-linecap="round"/>

  <!-- Left ear cup -->
  <rect x="32" y="38" width="14" height="18" rx="5" fill="#5e5c64"/>
  <rect x="34" y="40" width="10" height="14" rx="4" fill="#3d3846"/>
  <rect x="29" y="41" width="5" height="12" rx="2.5" fill="#77767b"/>

  <!-- Right ear cup -->
  <rect x="82" y="38" width="14" height="18" rx="5" fill="#5e5c64"/>
  <rect x="84" y="40" width="10" height="14" rx="4" fill="#3d3846"/>
  <rect x="94" y="41" width="5" height="12" rx="2.5" fill="#77767b"/>

  <!-- Mic boom -->
  <path d="M32 50 Q20 58 22 70" fill="none" stroke="#5e5c64" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Mic capsule -->
  <ellipse cx="22" cy="72" rx="4.5" ry="3.5" fill="#3d3846"/>
  <ellipse cx="22" cy="72" rx="2.5" ry="2" fill="#5e5c64"/>

  <!-- Cat tail -->
  <path d="M92 94 Q112 78 108 52 Q106 42 110 34" fill="none" stroke="#f5c211" stroke-width="6" stroke-linecap="round"/>

  <!-- Front paws -->
  <ellipse cx="48" cy="106" rx="9" ry="5" fill="#f5c211"/>
  <ellipse cx="80" cy="106" rx="9" ry="5" fill="#f5c211"/>
  <!-- Toe beans -->
  <circle cx="44" cy="107" r="1.5" fill="#ff9e3d" opacity="0.5"/>
  <circle cx="48" cy="108.5" r="1.5" fill="#ff9e3d" opacity="0.5"/>
  <circle cx="52" cy="107" r="1.5" fill="#ff9e3d" opacity="0.5"/>
  <circle cx="76" cy="107" r="1.5" fill="#ff9e3d" opacity="0.5"/>
  <circle cx="80" cy="108.5" r="1.5" fill="#ff9e3d" opacity="0.5"/>
  <circle cx="84" cy="107" r="1.5" fill="#ff9e3d" opacity="0.5"/>
</svg>
