- name: Mail-Triage
  slug: mail-triage
  language: Python
  summary: Self-hosted gray-mail killer for Microsoft 365.
  description: >
    Mail-Triage is a self-hosted service that clears the low-value "gray mail" out of
    Microsoft 365 mailboxes automatically. It handles multiple mailboxes from a single
    plain-text config file and keeps an audit log of every action it takes, so nothing
    happens to your inbox without a trail.
  features:
    - Multi-mailbox from one config
    - Plain-text configuration
    - Full audit log of every action
    - Self-hosted — you own the data
  tags: [Python, Microsoft 365, self-hosted, automation]
