- name: Chirp
  slug: chirp
  language: Go
  summary: Native GTK4/libadwaita Google Messages client for GNOME Linux.
  description: >
    Chirp is a fully native Google Messages desktop client for GNOME. Pair it with
    your phone via a QR code and your texts arrive on the desktop with iMessage-style
    chat bubbles, inline media, dual-SIM selection, and real-time delivery. A local
    SQLite cache means the whole conversation history is ready the instant you open
    the app — no spinner, no browser, no Electron.
  features:
    - Pair with your phone over a QR code
    - iMessage-style chat bubbles & inline media
    - Dual-SIM selection
    - Real-time message delivery
    - Local SQLite cache for instant startup
    - Zero Electron, zero embedded browser
  tags: [GTK4, libadwaita, Go, GNOME, SQLite]
  repo: https://github.com/DanielTylerReece/Chirp
  demo: ""
  featured: true
  weight: 1
