- name: Satwave
  slug: satwave
  language: C
  summary: Native GNOME desktop client for SiriusXM satellite radio.
  description: >
    Satwave brings SiriusXM to the Linux desktop as a proper native app. Browse the
    channel lineup, play live streams, and watch now-playing metadata scroll across a
    retro LCD-style display. Written in C with GTK4, libadwaita, and GStreamer for the
    audio pipeline. Requires a paid SiriusXM subscription.
  features:
    - Browse the full channel lineup
    - Play live satellite streams
    - Retro LCD now-playing display
    - GStreamer audio pipeline
    - Requires a paid SiriusXM subscription
  tags: [C, GTK4, libadwaita, GStreamer, GNOME]
  repo: https://github.com/DanielTylerReece/Satwave
